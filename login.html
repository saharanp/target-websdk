<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — GearUp Velocity</title>
  <meta name="description" content="Sign in to GearUp Velocity — demo accounts: runner, trainer, footballer." />

  <!-- ACDL stub + early user seed — runs synchronously BEFORE Launch so Target's
       page-top fetch sees the user object even if DOMContentLoaded hasn't fired. -->
  <script>
  (function () {
    window.adobeDataLayer = window.adobeDataLayer || [];
    try {
      var user = localStorage.getItem('gu_user');
      var pref = localStorage.getItem('gu_pref');
      window.adobeDataLayer.push({
        user: {
          loginState: user ? 'authenticated' : 'guest',
          username: user || null,
          preference: pref || null
        }
      });
    } catch (e) {}
  })();
  </script>

  <!-- Adobe Launch (Web SDK / alloy.js) -->
  <script src="https://assets.adobedtm.com/6a203c8a0ff8/1cf8f868f321/launch-b9f030aeef9f-development.min.js" async></script>

  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body data-page="login">
  <div id="app">
    <header id="navbar-container"></header>
    <div id="target-promo" role="complementary" aria-label="Promotional message"></div>
    <main id="main-content" aria-live="polite"></main>
    <footer id="footer-container"></footer>
  </div>

  <script src="/js/data.js"></script>
  <script src="/js/datalayer.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
