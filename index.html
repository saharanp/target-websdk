<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GearUp Velocity — Sports Gear &amp; Sportswear</title>
  <meta name="description" content="Premium sports gear, running shoes, training apparel, and football equipment for serious athletes." />

  <!-- ACDL stub — MUST exist before Launch loads so early pushes are captured -->
  <script>window.adobeDataLayer = window.adobeDataLayer || [];</script>

  <!-- Adobe Launch (Web SDK / alloy.js) -->
  <script src="https://assets.adobedtm.com/6a203c8a0ff8/1cf8f868f321/launch-b9f030aeef9f-development.min.js" async></script>

  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Navbar injected by renderNavbar() — cart badge updates on add/remove -->
    <header id="navbar-container"></header>

    <!-- PromoStrip — id="target-promo" for Adobe Target audience personalization -->
    <div id="target-promo" role="complementary" aria-label="Promotional message"></div>

    <!-- Page content swapped on every route change -->
    <main id="main-content" aria-live="polite"></main>

    <!-- Footer injected once on init -->
    <footer id="footer-container"></footer>
  </div>

  <!-- Load order: data → datalayer → router → components → app -->
  <script src="/js/data.js"></script>
  <script src="/js/datalayer.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
